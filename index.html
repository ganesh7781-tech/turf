<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K6 Turf & Swimming</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .landing-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            gap: 2rem;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }

        .landing-header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .landing-header h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .landing-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .choice-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 900px;
        }

        .choice-card {
            background: var(--surface);
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            text-decoration: none;
            transition: var(--transition);
            border: 2px solid transparent;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .choice-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 50px -15px rgba(16, 185, 129, 0.2);
        }

        .choice-icon {
            font-size: 4rem;
            color: var(--primary);
            background: var(--primary-light);
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            transition: var(--transition);
        }

        .choice-card:hover .choice-icon {
            background: var(--primary);
            color: white;
        }

        .choice-content h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .choice-content p {
            color: var(--text-muted);
        }

        .choice-btn {
            background: var(--primary);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            margin-top: 1rem;
        }

        @media (max-width: 600px) {
            .choice-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="landing-header">
            <div style="background: white; padding: 10px; border-radius: 24px; display: inline-flex; align-items: center; justify-content: center; box-shadow: var(--shadow-lg); margin-bottom: 2rem;">
                <img src="k6 logo.png" alt="K6 Logo" style="width: 150px; height: 150px; object-fit: contain;">
            </div>
            <h1>Welcome to K6 Turf</h1>
            <p>Select a service to proceed with your booking</p>
        </div>

        <div class="choice-grid">
            <a href="turf.html" class="choice-card">
                <div class="choice-icon">
                    <i class="ph-fill ph-baseball"></i>
                </div>
                <div class="choice-content">
                    <h2>Book Turf</h2>
                    <p>Experience the best football & cricket turf in Boisar.</p>
                </div>
                <div class="choice-btn">Go to Turf</div>
            </a>

            <a href="swimming.html" class="choice-card">
                <div class="choice-icon" style="color: #0ea5e9; background: #f0f9ff;">
                    <i class="ph-fill ph-waves"></i>
                </div>
                <div class="choice-content">
                    <h2>Book Swimming</h2>
                    <p>Dive into our crystal clear premium pool.</p>
                </div>
                <div class="choice-btn" style="background: #0ea5e9;">Go to Pool</div>
            </a>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
