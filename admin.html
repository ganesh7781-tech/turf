<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K6 Admin Pro v5.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { 
            --primary: #10b981; 
            --primary-dark: #059669;
            --bg: #f8fafc; 
            --text: #1e293b; 
            --muted: #64748b; 
            --border: #e2e8f0;
            --white: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --radius: 16px;
        }
        
        body { background: var(--bg); font-family: 'Outfit', sans-serif; margin: 0; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
        
        /* PREMIUM HEADER */
        .header { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            color: white; padding: 32px; border-radius: 24px; margin-bottom: 24px; 
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.2);
            position: relative; overflow: hidden;
        }
        .header::after { content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        .header-info { display: flex; align-items: center; gap: 20px; position: relative; z-index: 1; }
        .header-logo { width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.3); background: black; object-fit: cover; }
        
        /* DASHBOARD CARDS */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .card { background: var(--white); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); transition: all 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .stat-card { display: flex; align-items: center; gap: 20px; }
        .stat-icon { width: 56px; height: 56px; background: #dcfce7; color: var(--primary); display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 24px; }
        .stat-label { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }

        /* TABS */
        .tabs { background: #e2e8f0; padding: 6px; border-radius: 16px; display: flex; gap: 6px; margin-bottom: 24px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--muted); font-weight: 600; cursor: pointer; border-radius: 12px; transition: all 0.2s; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-btn.active { background: var(--white); color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }

        /* BUTTONS */
        .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-p { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); }
        .btn-p:hover { background: var(--primary-dark); transform: scale(1.02); }
        .btn-s { background: var(--white); color: var(--muted); border: 1px solid var(--border); }
        .btn-s:hover { border-color: var(--primary); color: var(--primary); }
        .btn-d { background: #fee2e2; color: #ef4444; width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        .btn-d:hover { background: #ef4444; color: white; }

        /* SLOTS GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .slot { background: var(--white); border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
        .slot:hover:not(.full) { border-color: var(--primary); background: #f0fdf4; transform: translateY(-2px); }
        .slot.booked { border-left: 4px solid #ef4444; background: #fff1f2; cursor: default; }
        .slot.available { border-left: 4px solid var(--primary); }
        .slot.full { background: #f1f5f9; cursor: not-allowed; border-left: 4px solid #64748b; opacity: 0.8; }
        .slot-time { font-weight: 700; font-size: 15px; margin-bottom: 6px; display: block; }
        .slot-info { font-size: 13px; color: var(--muted); font-weight: 500; }
        .slot-price { font-size: 14px; color: var(--primary); font-weight: 700; margin-top: 8px; }

        /* TABLE */
        .table-wrap { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow-x: auto; box-shadow: var(--shadow); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { padding: 16px; background: #f8fafc; text-align: left; font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-upi { background: #e0f2fe; color: #0369a1; }
        .badge-cash { background: #fef3c7; color: #92400e; }
        .badge-ok { background: #dcfce7; color: #166534; }
        .badge-cancel { background: #fee2e2; color: #b91c1c; }

        /* MODAL */
        .modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal { background: var(--white); padding: 32px; border-radius: 24px; width: 90%; max-width: 440px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 1px solid var(--border); animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .form-g { margin-bottom: 20px; }
        .form-g label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--muted); }
        .form-g input, .form-g select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 12px; font-family: inherit; font-size: 14px; transition: border 0.2s; box-sizing: border-box; }
        .form-g input:focus { border-color: var(--primary); outline: none; }

        /* LOGIN */
        #login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #10b981 0%, #059669 100%); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); }

        .content { display: none; }
        .content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="login">
        <div class="login-card">
            <img src="k6 logo.png" style="width:90px; height:90px; border-radius:50%; margin-bottom:20px; border: 3px solid var(--primary); background:black;">
            <h2 style="margin:0;">Welcome Back</h2>
            <p style="color:var(--muted); font-size:14px; margin-bottom:24px;">Please login to manage K6 Turf</p>
            <input type="password" id="pw" placeholder="Admin Password" style="width:100%; padding:14px; margin-bottom:16px; border:1px solid #ddd; border-radius:12px; box-sizing:border-box;">
            <button class="btn btn-p" onclick="doLogin()" style="width:100%; justify-content:center;">Access Dashboard</button>
        </div>
    </div>

    <div class="container" id="main" style="display: none;">
        <div class="header">
            <div class="header-info">
                <img src="k6 logo.png" class="header-logo">
                <div>
                    <h2 style="margin:0; font-size:24px;">K6 Admin Pro</h2>
                    <small style="opacity:0.8; font-weight:500;">v5.0 Ultimate Experience</small>
                </div>
            </div>
            <button class="btn btn-s" onclick="sessionStorage.clear(); location.reload();" style="background:rgba(255,255,255,0.2); color:white; border:none;"><i class="ph ph-sign-out"></i></button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tb-list" onclick="setTab('list')"><i class="ph ph-bookmarks"></i> Bookings</button>
            <button class="tab-btn" id="tb-sch" onclick="setTab('sch')"><i class="ph ph-calendar"></i> Schedule</button>
        </div>

        <div id="list-tab" class="content active">
            <div class="stats-row">
                <div class="card stat-card">
                    <div class="stat-icon"><i class="ph-fill ph-users"></i></div>
                    <div><div class="stat-label">Total Customers</div><div id="stat-c" class="stat-value">0</div></div>
                </div>
                <div class="card stat-card">
                    <div class="stat-icon"><i class="ph-fill ph-money"></i></div>
                    <div><div class="stat-label">Total Revenue</div><div id="stat-r" class="stat-value">₹0</div></div>
                </div>
            </div>

            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
                <h3 style="margin:0; font-size:20px;">Recent Bookings</h3>
                <div style="display:flex; gap:12px;">
                    <button class="btn btn-p" onclick="openNew()"><i class="ph ph-plus-circle"></i> Add New</button>
                    <button class="btn btn-s" onclick="showList()"><i class="ph ph-arrows-clockwise"></i></button>
                    <button class="btn btn-s" onclick="exportCSV()"><i class="ph ph-download"></i></button>
                </div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>ID</th><th>Service</th><th>Customer</th><th>WhatsApp</th><th>Date</th><th>Slot</th><th>Price</th><th>Pay</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="btable"></tbody>
                </table>
            </div>
        </div>

        <div id="sch-tab" class="content">
            <div class="card" style="margin-bottom:24px;">
                <div style="display:flex; gap:15px; align-items:flex-end; flex-wrap:wrap;">
                    <div class="form-g" style="margin:0; flex:1; min-width:150px;"><label>Service Type</label><select id="stype"><option value="turf">Turf Only</option><option value="swimming">Swimming Pool</option></select></div>
                    <div class="form-g" style="margin:0; flex:1; min-width:150px;"><label>Select Date</label><input type="date" id="sdate"></div>
                    <button class="btn btn-p" onclick="showSch()" style="flex:1;">Show Slots</button>
                    <button class="btn btn-s" onclick="openNew()" style="flex:1;">Manual Entry</button>
                </div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content: space-between; border-bottom:1px solid #f1f5f9; padding-bottom:15px; margin-bottom:20px;">
                    <div style="display:flex; align-items:center; gap:10px;"><i class="ph ph-clock" style="color:var(--primary); font-size:20px;"></i><h4 id="stitle" style="margin:0; font-size:18px;">Daily Schedule</h4></div>
                    <span id="sdisplay" style="color:var(--primary); font-weight:700; font-size:16px;"></span>
                </div>
                <div id="sgrid" class="grid"></div>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="mbg">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h3 id="mtitle" style="margin:0; font-size:20px;">Booking Details</h3>
                <button onclick="closeModal()" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:24px;"><i class="ph ph-x"></i></button>
            </div>
            <form id="mform">
                <input type="hidden" id="mid">
                <div class="form-g"><label>Service</label><select id="mtype"><option value="turf">Turf</option><option value="swimming">Swimming</option></select></div>
                <div style="display:flex; gap:12px;">
                    <div class="form-g" style="flex:1;"><label>Date</label><input type="date" id="mdate" required onchange="updateAvailableSlots()"></div>
                    <div class="form-g" style="flex:1;"><label>Time Slot</label><select id="mtime" required></select></div>
                </div>
                <div class="form-g"><label>Customer Name</label><input type="text" id="mname" required placeholder="Full Name"></div>
                <div class="form-g"><label>WhatsApp Number</label><input type="tel" id="mphone" required placeholder="98765 43210"></div>
                <div style="display:flex; gap:12px;" id="mdur-g">
                    <div class="form-g" style="flex:1;"><label>Duration</label><select id="mdur"><option value="1">1 Hour</option><option value="1.5">1.5 Hours</option><option value="2">2 Hours</option></select></div>
                    <div class="form-g" style="flex:1;"><label>Payment</label><select id="mpay"><option value="Cash">Cash</option><option value="UPI">UPI</option><option value="Pending">Pending</option></select></div>
                </div>
                <div id="mcount-g" class="form-g" style="display:none;"><label>Number of Persons</label><input type="number" id="mcount" value="1" min="1" max="50"></div>
                <div class="form-g"><label>Total Price (₹)</label><input type="text" id="mprice" placeholder="700"></div>
                <div style="display:flex; gap:12px; margin-top:32px;">
                    <button type="button" class="btn btn-s" onclick="closeModal()" style="flex:1; justify-content:center;">Discard</button>
                    <button type="submit" class="btn btn-p" style="flex:1; justify-content:center;">Confirm Booking</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.onerror = function(m, u, l) { alert("Admin Pro Error: " + m); return false; };

        const TSLOTS = ['11:30 AM - 12:30 PM', '12:00 PM - 01:00 PM', '01:00 PM - 02:00 PM', '02:00 PM - 03:00 PM', '03:00 PM - 04:00 PM', '04:00 PM - 05:00 PM', '05:00 PM - 06:00 PM', '06:00 PM - 07:00 PM', '07:00 PM - 08:00 PM', '08:00 PM - 09:00 PM', '09:00 PM - 10:00 PM', '10:00 PM - 11:00 PM', '11:00 PM - 12:00 AM'];
        const SSLOTS = ['07:00 AM - 08:00 AM', '08:00 AM - 09:00 AM', '09:00 AM - 10:00 AM', '10:00 AM - 11:00 AM', '03:00 PM - 04:00 PM', '04:00 PM - 05:00 PM', '05:00 PM - 06:00 PM', '06:00 PM - 07:00 PM', '07:00 PM - 08:00 PM', '08:00 PM - 09:00 PM'];
        let bp = 700;

        function doLogin() {
            if (document.getElementById('pw').value === 'k6admin') {
                sessionStorage.setItem('k6_auth', 'true');
                document.getElementById('login').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                showList();
            } else alert("Invalid Password");
        }

        function setTab(id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tb-' + id).classList.add('active');
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.getElementById(id + '-tab').classList.add('active');
            if (id === 'sch') {
                if(!document.getElementById('sdate').value) document.getElementById('sdate').value = new Date().toISOString().split('T')[0];
                showSch();
            } else showList();
        }

        function showList() {
            const data = JSON.parse(localStorage.getItem('turf_bookings') || '[]');
            data.sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
            const body = document.getElementById('btable');
            body.innerHTML = '';
            let rev = 0;
            data.forEach(b => {
                if(b.status !== 'cancelled') rev += parseInt((b.price||'0').replace(/[^0-9]/g, '')) || 0;
                const tr = document.createElement('tr');
                const bType = b.type || 'turf';
                const bc = b.status === 'cancelled' ? 'badge-cancel' : 'badge-ok';
                const pc = b.payMode === 'UPI' ? 'badge-upi' : (b.payMode==='Cash'?'badge-cash':'');
                tr.innerHTML = `<td><small>#${b.id.slice(-5)}</small></td><td><span style="font-weight:700; color:${bType==='swimming'?'#0ea5e9':'#10b981'}">${bType.toUpperCase()}</span></td><td><b>${b.name}</b></td><td>${b.whatsapp}</td><td>${b.date}</td><td>${b.time}</td><td>${b.price}</td><td><span class="badge ${pc}">${b.payMode||'?'}${b.count?` (${b.count}p)`:''}</span></td><td><span class="badge ${bc}">${b.status||'confirmed'}</span></td><td><div style="display:flex; gap:5px;"><button class="btn btn-s" style="padding:6px;" onclick="editB('${b.id}')"><i class="ph ph-pencil"></i></button><button class="btn-d" onclick="cancelB('${b.id}')"><i class="ph ph-trash"></i></button></div></td>`;
                body.appendChild(tr);
            });
            document.getElementById('stat-c').textContent = data.filter(b => b.status !== 'cancelled').length;
            document.getElementById('stat-r').textContent = '₹' + rev.toLocaleString();
        }

        function editB(id) {
            const data = JSON.parse(localStorage.getItem('turf_bookings') || '[]');
            const b = data.find(x => x.id === id);
            if (!b) return;
            document.getElementById('mid').value = b.id;
            document.getElementById('mtype').value = b.type || 'turf';
            document.getElementById('mdate').value = b.date;
            document.getElementById('mtime').value = b.time;
            document.getElementById('mname').value = b.name;
            document.getElementById('mphone').value = b.whatsapp;
            document.getElementById('mprice').value = (b.price||'').replace(/[^0-9]/g, '');
            document.getElementById('mpay').value = b.payMode || 'Cash';
            document.getElementById('mcount').value = b.count || 1;
            document.getElementById('mtitle').textContent = "Edit Booking";
            toggleMFields();
            document.getElementById('mbg').style.display = 'flex';
        }

        function cancelB(id) { if(confirm("Cancel this booking?")) { let d = JSON.parse(localStorage.getItem('turf_bookings')||'[]'); const i = d.findIndex(x => x.id===id); if(i>-1){ d[i].status='cancelled'; localStorage.setItem('turf_bookings', JSON.stringify(d)); showList(); } } }

        function showSch() {
            const type = document.getElementById('stype').value;
            const date = document.getElementById('sdate').value;
            if(!date) return;
            const [y,m,d] = date.split('-');
            document.getElementById('sdisplay').textContent = new Date(y, m-1, d).toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
            document.getElementById('stitle').textContent = type === 'turf' ? "TURF SLOTS" : "SWIMMING SLOTS";
            
            const data = JSON.parse(localStorage.getItem('turf_bookings') || '[]');
            const booked = data.filter(b => b.date===date && b.type===type && b.status!=='cancelled');
            const slots = type==='turf' ? TSLOTS : SSLOTS;
            const grid = document.getElementById('sgrid');
            grid.innerHTML = '';
            
            slots.forEach(s => {
                const bList = booked.filter(x => x.time===s);
                let totalP = 0; bList.forEach(x => totalP += parseInt(x.count || 1));
                
                const div = document.createElement('div');
                let status = 'available';
                if (type === 'turf' && bList.length > 0) status = 'booked';
                if (type === 'swimming' && totalP >= 50) status = 'full';
                
                div.className = 'slot ' + status;
                let info = '';
                if (type === 'turf') {
                    info = bList.length > 0 ? `<span style="color:#ef4444;">${bList[0].name}</span>` : `<span style="color:var(--primary);">Available</span>`;
                } else {
                    info = `<span style="${totalP >= 50 ? 'color:#ef4444' : 'color:var(--primary)'}">${totalP}/50 People</span>`;
                }
                
                const price = type==='turf' ? (getP(s)) : 100;
                div.innerHTML = `<span class="slot-time">${s}</span><div class="slot-info">${info}</div><div class="slot-price">₹${price}${type==='swimming'?'/p':''}</div>`;
                
                if(status !== 'full' && (type==='swimming' || status==='available')) {
                    div.onclick = () => openM(s, type, date, price);
                }
                grid.appendChild(div);
            });
        }

        function getP(time) {
            if (time.includes('04:30')) return 600;
            if (time.includes('05:') || time.includes('06:') || time.includes('07:') || time.includes('08:') || time.includes('09:') || time.includes('10:') || time.includes('11:')) return 700;
            return 500;
        }

        function updateAvailableSlots() {
            const type = document.getElementById('mtype').value;
            const date = document.getElementById('mdate').value;
            const timeSelect = document.getElementById('mtime');
            const currentVal = timeSelect.getAttribute('data-val') || '';
            timeSelect.innerHTML = '';
            
            const data = JSON.parse(localStorage.getItem('turf_bookings') || '[]');
            const booked = data.filter(b => b.date === date && b.type === type && b.status !== 'cancelled');
            const slots = type === 'turf' ? TSLOTS : SSLOTS;
            
            slots.forEach(s => {
                const isBooked = type === 'turf' && booked.some(b => b.time === s);
                // For swimming, we allow double bookings up to 50, but we can list all slots
                if (!isBooked || s === currentVal) {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s;
                    if (s === currentVal) opt.selected = true;
                    timeSelect.appendChild(opt);
                }
            });
        }

        function toggleMFields() {
            const type = document.getElementById('mtype').value;
            document.getElementById('mdur-g').style.display = type === 'turf' ? 'flex' : 'none';
            document.getElementById('mcount-g').style.display = type === 'swimming' ? 'block' : 'none';
            updateAvailableSlots();
        }
        document.getElementById('mtype').onchange = toggleMFields;

        function openM(s, type, date, p) {
            bp = p;
            document.getElementById('mid').value = '';
            document.getElementById('mtype').value = type;
            document.getElementById('mdate').value = date;
            document.getElementById('mtime').setAttribute('data-val', s); // Temp store to select
            document.getElementById('mprice').value = p;
            document.getElementById('mname').value = '';
            document.getElementById('mphone').value = '';
            document.getElementById('mcount').value = 1;
            document.getElementById('mtitle').textContent = "Manual Booking";
            toggleMFields();
            document.getElementById('mbg').style.display = 'flex';
        }

        function openNew() { 
            const date = document.getElementById('sdate').value || new Date().toISOString().split('T')[0];
            const type = document.getElementById('stype').value || 'turf';
            openM('', type, date, type==='turf'?700:100); 
        }
        function closeModal() { document.getElementById('mbg').style.display = 'none'; }

        document.getElementById('mform').onsubmit = (e) => {
            e.preventDefault();
            let d = JSON.parse(localStorage.getItem('turf_bookings') || '[]');
            const mid = document.getElementById('mid').value;
            const type = document.getElementById('mtype').value;
            const newB = {
                id: mid || ('A-' + Math.random().toString(36).substring(2,7).toUpperCase()),
                type: type,
                name: document.getElementById('mname').value,
                whatsapp: document.getElementById('mphone').value,
                date: document.getElementById('mdate').value,
                time: document.getElementById('mtime').value,
                price: '₹' + document.getElementById('mprice').value,
                payMode: document.getElementById('mpay').value,
                count: type === 'swimming' ? document.getElementById('mcount').value : 1,
                timestamp: new Date().toISOString(),
                status: 'confirmed'
            };
            if (mid) {
                const i = d.findIndex(x => x.id === mid);
                if (i > -1) d[i] = newB;
            } else d.push(newB);
            localStorage.setItem('turf_bookings', JSON.stringify(d));
            closeModal(); showList(); showSch(); alert(mid ? "Updated!" : "Booked!");
        };

        document.getElementById('mdur').onchange = () => {
            document.getElementById('mprice').value = Math.round(bp * parseFloat(document.getElementById('mdur').value));
        };
        document.getElementById('mcount').onchange = () => {
            if(document.getElementById('mtype').value === 'swimming') document.getElementById('mprice').value = 100 * parseInt(document.getElementById('mcount').value);
        };

        function exportCSV() {
            const data = JSON.parse(localStorage.getItem('turf_bookings') || '[]');
            if (data.length === 0) return alert("No data");
            let csv = "ID,Type,Name,WhatsApp,Date,Time,Price,PayMode,Status\n";
            data.forEach(b => { csv += `${b.id},${b.type},${b.name},${b.whatsapp},${b.date},${b.time},${b.price},${b.payMode||''},${b.status||'confirmed'}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'bookings.csv'; a.click();
        }

        if(sessionStorage.getItem('k6_auth') === 'true') {
            document.getElementById('login').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            showList();
        }
    </script>
</body>
</html>
