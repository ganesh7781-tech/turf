<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boisar Turf - Admin Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: var(--transition);
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            color: var(--primary);
            background: var(--primary-light);
            padding: 1rem;
            border-radius: var(--radius-md);
        }

        .stat-info h3 {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-info .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .table-container {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        tbody tr {
            transition: var(--transition);
        }
        
        tbody tr:hover {
            background-color: #f8fafc;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.875rem;
            white-space: nowrap;
        }

        td {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--border);
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }
        
        .header-actions h2 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .clear-btn {
            background-color: white;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .clear-btn:hover {
            background-color: var(--danger);
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="app-header" style="padding: 1.5rem;">
            <div class="logo-container">
                <i class="ph-fill ph-baseball"></i>
                <h1 style="font-size: 1.5rem;">Boisar Turf Admin</h1>
            </div>
            <p>Manage your bookings and view players.</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="ph-fill ph-ticket"></i></div>
                <div class="stat-info">
                    <h3>Total Bookings</h3>
                    <div class="value" id="total-bookings">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="ph-fill ph-wallet"></i></div>
                <div class="stat-info">
                    <h3>Est. Revenue</h3>
                    <div class="value" id="total-revenue">₹0</div>
                </div>
            </div>
        </div>

        <div class="header-actions">
            <h2><i class="ph-fill ph-clock-counter-clockwise"></i> Recent Bookings</h2>
            <div style="display:flex; gap:0.5rem;">
                <button class="btn-confirm" id="export-csv" style="padding:0.5rem 1rem;font-size:0.875rem;width:auto;display:flex;align-items:center;gap:0.5rem;"><i class="ph ph-file-csv"></i> Export CSV</button>
                <button class="clear-btn" id="clear-data"><i class="ph ph-trash"></i> Clear Data</button>
            </div>
        </div>

        <div class="filters-container" style="background:var(--surface); padding:1rem; border-radius:var(--radius-md); border:1px solid var(--border); margin-bottom:1.5rem; display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap;">
            <div>
                <label style="display:block; font-size:0.75rem; color:var(--text-muted); font-weight:600; margin-bottom:0.25rem;">From Date</label>
                <input type="date" id="filter-from" style="padding:0.5rem; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:inherit;">
            </div>
            <div>
                <label style="display:block; font-size:0.75rem; color:var(--text-muted); font-weight:600; margin-bottom:0.25rem;">To Date</label>
                <input type="date" id="filter-to" style="padding:0.5rem; border:1px solid var(--border); border-radius:var(--radius-sm); font-family:inherit;">
            </div>
            <button class="btn-secondary" id="apply-filter" style="padding:0.5rem 1rem; width:auto; font-size:0.875rem; font-weight:600;">Apply Filter</button>
            <button class="btn-cancel" id="reset-filter" style="padding:0.5rem 1rem; width:auto; font-size:0.875rem; background:transparent; text-decoration:underline;">Reset</button>
        </div>

        <div class="table-container">
            <table id="bookings-table">
                <thead>
                    <tr>
                        <th><i class="ph ph-hash"></i> ID</th>
                        <th><i class="ph ph-user"></i> Player</th>
                        <th><i class="ph ph-whatsapp-logo"></i> WhatsApp</th>
                        <th><i class="ph ph-calendar"></i> Date</th>
                        <th><i class="ph ph-clock"></i> Time Slot</th>
                        <th><i class="ph ph-currency-inr"></i> Price</th>
                        <th><i class="ph ph-shield-check"></i> Status</th>
                        <th><i class="ph ph-gear"></i> Actions</th>
                    </tr>
                </thead>
                <tbody id="bookings-body">
                    <!-- Rows generated via JS -->
                </tbody>
            </table>
            <div id="empty-state" class="empty-state" style="display: none;">
                <i class="ph ph-calendar-x"></i>
                <p>No bookings found yet. Wait for customers to book!</p>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed', err));
            });
        }
    </script>
</body>
</html>
