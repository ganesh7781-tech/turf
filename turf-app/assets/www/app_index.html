<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K6 Turf & Swimming</title>
    <meta name="theme-color" content="#10b981">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="turf-theme">
    <!-- LANDING VIEW -->
    <div id="landing-view" class="view-section active">
        <div class="landing-container" style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; gap: 2rem; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);">
            <div class="landing-header" style="text-align: center; margin-bottom: 1rem;">
                <img src="k6 logo.png" alt="K6 Logo" onclick="logoClick()" style="width: 150px; height: 150px; border-radius: 50%; border: 5px solid white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); margin-bottom: 2rem; background: black; cursor: pointer;">
                <h1 style="font-size: 2.5rem; color: #0f172a; margin-bottom: 0.5rem;">Welcome to K6 Turf</h1>
                <p style="color: #64748b; font-size: 1.1rem;">Select a service to proceed with your booking</p>
            </div>

            <div class="choice-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; width: 100%; max-width: 900px;">
                <div class="choice-card" onclick="showView('turf')" style="background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); display: flex; flex-direction: column; cursor: pointer;">
                    <div class="card-image" style="width: 100%; height: 180px; overflow: hidden;"><img src="turf_preview.png" style="width: 100%; height: 100%; object-fit: cover;"></div>
                    <div class="choice-content" style="padding: 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 0.75rem;">
                        <div class="choice-icon" style="font-size: 2rem; color: #10b981; background: #ecfdf5; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin-top: -3rem; border: 4px solid white;"><i class="ph-fill ph-baseball"></i></div>
                        <h2 style="font-size: 1.5rem;">Book Turf</h2>
                        <p style="color: #64748b;">Premium football & cricket turf.</p>
                    </div>
                    <div class="choice-btn" style="background: #10b981; color: white; padding: 0.75rem; border-radius: 50px; font-weight: 600; margin: 0 1.5rem 1.5rem 1.5rem; text-align: center;">Go to Turf</div>
                </div>

                <div class="choice-card" onclick="showView('swimming')" style="background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); display: flex; flex-direction: column; cursor: pointer;">
                    <div class="card-image" style="width: 100%; height: 180px; overflow: hidden;"><img src="swimming_preview.png" style="width: 100%; height: 100%; object-fit: cover;"></div>
                    <div class="choice-content" style="padding: 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 0.75rem;">
                        <div class="choice-icon" style="font-size: 2rem; color: #0ea5e9; background: #f0f9ff; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 16px; margin-top: -3rem; border: 4px solid white;"><i class="ph-fill ph-waves"></i></div>
                        <h2 style="font-size: 1.5rem;">Book Swimming</h2>
                        <p style="color: #64748b;">Crystal clear pool.</p>
                    </div>
                    <div class="choice-btn" style="background: #0ea5e9; color: white; padding: 0.75rem; border-radius: 50px; font-weight: 600; margin: 0 1.5rem 1.5rem 1.5rem; text-align: center;">Go to Pool</div>
                </div>
            </div>
        </div>
    </div>

    <!-- VIEWS WILL BE POPULATED VIA app.js Logic -->
    <div id="turf-view" class="view-section">
        <button class="back-btn" onclick="showView('landing')" style="position: absolute; top: 1rem; left: 1rem; background: rgba(0,0,0,0.1); color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; font-weight: 600; z-index: 10;">← Back</button>
        <div class="app-container">
            <header class="app-header"><h1>K6 Turf</h1><p>Select your slot</p></header>
            <main class="main-layout">
                <div class="card form-card">
                    <div class="form-group"><label>Full Name</label><div class="input-wrapper"><i class="ph ph-user"></i><input type="text" id="turf-name" required></div></div>
                    <div class="form-group"><label>WhatsApp</label><div class="input-wrapper"><i class="ph ph-whatsapp-logo"></i><input type="tel" id="turf-whatsapp" required></div></div>
                    <div class="form-group"><label>Date</label><div class="input-wrapper"><i class="ph ph-calendar-blank"></i><input type="date" id="turf-date" required></div></div>
                </div>
                <div class="card slots-card">
                    <div class="slots-header"><h2>Select Slot</h2><div class="date-display" id="turf-display-date">Today</div></div>
                    <div id="turf-morning-slots" class="slots-grid"></div>
                    <div id="turf-afternoon-slots" class="slots-grid"></div>
                    <div id="turf-evening-slots" class="slots-grid"></div>
                    <div id="turf-night-slots" class="slots-grid"></div>
                    <button class="btn-primary" id="turf-book-btn-mobile" disabled>Review Booking</button>
                </div>
            </main>
        </div>
    </div>

    <div id="swimming-view" class="view-section swimming-theme">
        <button class="back-btn" onclick="showView('landing')" style="position: absolute; top: 1rem; left: 1rem; background: rgba(0,0,0,0.1); color: white; border: none; padding: 0.5rem 1rem; border-radius: 50px; font-weight: 600; z-index: 10;">← Back</button>
        <div class="app-container">
            <header class="app-header"><h1>K6 Swimming</h1><p>Select session</p></header>
            <main class="main-layout">
                <div class="card form-card">
                    <div class="form-group"><label>Full Name</label><div class="input-wrapper"><i class="ph ph-user"></i><input type="text" id="swim-name" required></div></div>
                    <div class="form-group"><label>WhatsApp</label><div class="input-wrapper"><i class="ph ph-whatsapp-logo"></i><input type="tel" id="swim-whatsapp" required></div></div>
                    <div class="form-group"><label>People</label><div class="input-wrapper"><i class="ph ph-users"></i><input type="number" id="swim-people" value="1" min="1" required></div></div>
                    <div class="form-group"><label>Date</label><div class="input-wrapper"><i class="ph ph-calendar-blank"></i><input type="date" id="swim-date" required></div></div>
                </div>
                <div class="card slots-card">
                    <div class="slots-header"><h2>Sessions</h2><div class="date-display" id="swim-display-date">Today</div></div>
                    <div id="swim-morning-slots" class="slots-grid"></div>
                    <div id="swim-afternoon-slots" class="slots-grid"></div>
                    <div id="swim-evening-slots" class="slots-grid"></div>
                    <button class="btn-primary" id="swim-book-btn-mobile" disabled>Review Booking</button>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals (Simplified) -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal">
            <h3>Confirm</h3>
            <div id="confirm-details"></div>
            <button class="btn-confirm" id="final-confirm-btn">Confirm</button>
            <button class="btn-cancel" onclick="closeModal('confirm-modal')">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="qr-modal">
        <div class="modal">
            <h3>Payment</h3>
            <p id="qr-price"></p>
            <img id="qr-image" style="width:100%; border-radius:10px;">
            <input type="text" id="utr-input" placeholder="UTR Number" maxlength="12">
            <button class="btn-confirm" id="verify-btn" disabled>Verify</button>
            <button id="venue-btn">Pay at Venue</button>
        </div>
    </div>

    <div class="modal-overlay" id="ticket-modal">
        <div class="modal">
            <h2>Success!</h2>
            <div id="final-id"></div>
            <button onclick="location.reload()">Done</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
